<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Porter Music — Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
<style>
/* ============================================================
   PORTER MUSIC — DESIGN SYSTEM (tokens únicos)
   Fonte da verdade de espaçamento, tipografia, cor, raio,
   sombra e transição. Nenhuma tela deve declarar valores
   próprios — use sempre estes tokens/classes.
   ============================================================ */
:root{
  /* ---- Espaçamento: escala base (px) ---- */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s8:32px; --s10:40px; --s12:48px;
  /* ---- Espaçamento: tokens semânticos (use estes) ---- */
  --space-xs:var(--s1);   /* 4  */
  --space-sm:var(--s2);   /* 8  */
  --space-md:var(--s4);   /* 16 */
  --space-lg:var(--s6);   /* 24 */
  --space-xl:var(--s8);   /* 32 */
  --space-2xl:var(--s12); /* 48 */

  /* ---- Raio ---- */
  --r-xs:6px; --r-sm:8px; --r-md:10px; --r-lg:14px; --r-xl:18px; --r-full:999px;

  /* ---- Tipografia ---- */
  --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --fs-display:28px; --fs-h1:20px; --fs-h2:16px; --fs-h3:14px;
  --fs-title:15px; --fs-subtitle:13px; --fs-body:13.5px; --fs-small:12px; --fs-caption:11px;
  --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700;

  /* ---- Cores (light) ---- */
  --bg:#f7f8fa;
  --surface:#ffffff;
  --surface-2:#fbfbfc;
  --surface-hover:#f5f6f8;
  --border:#ececef;
  --border-strong:#e0e0e5;
  --text:#18181b;
  --text-2:#5b5b66;
  --text-3:#8e8e99;
  --primary:#4f46e5;
  --primary-hover:#4338ca;
  --primary-active:#3730a3;
  --primary-weak:#eef0fe;
  --primary-ink:#ffffff;
  --secondary:#64748b;
  --secondary-hover:#4d5766;
  --secondary-weak:#eef1f4;
  --secondary-ink:#ffffff;
  --success:#0f9d6b; --success-bg:#e7f7f0; --success-ink:#0a6b49;
  --warning:#c67a09; --warning-bg:#fdf4e3; --warning-ink:#8a5606;
  --danger:#dc3d43; --danger-hover:#c62d33; --danger-bg:#fdecec; --danger-ink:#a72a2f;
  --info:#3b6ef6; --info-bg:#eaf0ff; --info-ink:#2a52c0;
  --neutral-bg:#f1f1f4; --neutral-ink:#5b5b66;
  --muted:var(--text-3);
  --violet:#8b5cf6;
  --ring:0 0 0 3px rgba(79,70,229,.16);

  /* ---- Sombras: 3 níveis canônicos (sm / md / lg) ---- */
  --shadow-xs:0 1px 2px rgba(24,24,27,.05);
  --shadow-sm:0 1px 3px rgba(24,24,27,.06),0 1px 2px rgba(24,24,27,.04);
  --shadow-md:0 4px 12px rgba(24,24,27,.08);
  --shadow-lg:0 8px 30px rgba(24,24,27,.12),0 2px 6px rgba(24,24,27,.06);
  --shadow-pop:var(--shadow-lg); /* alias legado */

  /* ---- Transições ---- */
  --t-fast:.12s ease;
  --t-base:.16s ease;
  --t-slow:.24s ease;
  --t-hover:background var(--t-fast),border-color var(--t-fast),color var(--t-fast),box-shadow var(--t-fast);
  --t-dropdown:.12s ease;
  --t-modal:.14s ease;
  --t-toast:.16s ease;
  --t-drawer:.24s cubic-bezier(.4,0,.2,1);
  --t-accordion:.2s ease;

  /* ---- Layout ---- */
  --sidebar-w:260px; --header-h:60px;
}
[data-theme="dark"]{
  --bg:#0b0c0f; --surface:#141519; --surface-2:#17181d; --surface-hover:#1d1f26;
  --border:#26272e; --border-strong:#32333c;
  --text:#f2f2f4; --text-2:#a9aab4; --text-3:#71727c;
  --primary:#6e66f0; --primary-hover:#8079f5; --primary-active:#5b52e8; --primary-weak:#1e1d3a; --primary-ink:#fff;
  --secondary:#8b95a5; --secondary-hover:#9ba5b3; --secondary-weak:#20222a; --secondary-ink:#0b0c0f;
  --success:#22b483; --success-bg:#0f2a22; --success-ink:#4fd3a5;
  --warning:#e0982f; --warning-bg:#2b2113; --warning-ink:#f0b968;
  --danger:#eb5a5f; --danger-hover:#f06b70; --danger-bg:#2c1517; --danger-ink:#f28b8f;
  --info:#5b83f7; --info-bg:#151d33; --info-ink:#8dabfb;
  --neutral-bg:#22232a; --neutral-ink:#a9aab4;
  --muted:var(--text-3);
  --violet:#a78bfa;
  --shadow-lg:0 10px 34px rgba(0,0,0,.5);
}

*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;font-feature-settings:"cv02","cv03","ss01"}
button{font:inherit;color:inherit;cursor:pointer;border:0;background:none}
input,select,textarea{font:inherit;color:inherit}
a{color:var(--primary);text-decoration:none}
::selection{background:var(--primary-weak)}
.ic{display:inline-flex;align-items:center;justify-content:center}
.ic svg{width:16px;height:16px}
.ic-sm svg{width:14px;height:14px}
.ic-lg svg{width:20px;height:20px}

/* ============ TIPOGRAFIA (tokens únicos — nunca use font-size solto) ============ */
.display{font-size:var(--fs-display);font-weight:var(--fw-bold);letter-spacing:-.02em;line-height:1.15;margin:0}
.h1{font-size:var(--fs-h1);font-weight:var(--fw-semibold);letter-spacing:-.01em;margin:0}
.h2{font-size:var(--fs-h2);font-weight:var(--fw-semibold);letter-spacing:-.01em;margin:0}
.h3{font-size:var(--fs-h3);font-weight:var(--fw-semibold);margin:0}
.title{font-size:var(--fs-title);font-weight:var(--fw-semibold);letter-spacing:-.01em;margin:0}
.subtitle{font-size:var(--fs-subtitle);font-weight:var(--fw-medium);color:var(--text-2);margin:0}
.body{font-size:var(--fs-body);font-weight:var(--fw-regular);color:var(--text);line-height:1.5;margin:0}
.small{font-size:var(--fs-small);color:var(--text-2)}
.eyebrow{font-size:var(--fs-caption);font-weight:var(--fw-semibold);letter-spacing:.06em;text-transform:uppercase;color:var(--text-3)}
.sub{font-size:13px;color:var(--text-2);margin:2px 0 0}
.caption{font-size:var(--fs-small);color:var(--text-3)}
.muted{color:var(--muted)}

/* ============ BUTTONS (variantes: primary/secondary/outline/ghost/danger/success/link) ============ */
.btn{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:var(--s2);height:36px;padding:0 var(--s4);border-radius:var(--r-sm);font-size:13px;font-weight:550;white-space:nowrap;transition:var(--t-hover),filter var(--t-fast);border:1px solid transparent}
.btn:focus-visible{outline:none;box-shadow:var(--ring)}
.btn .ic svg{width:15px;height:15px}
.btn-primary{background:var(--primary);color:var(--primary-ink)}
.btn-primary:hover{background:var(--primary-hover)}
.btn-primary:active{background:var(--primary-active)}
.btn-secondary{background:var(--surface);color:var(--text);border-color:var(--border-strong)}
.btn-secondary:hover{background:var(--surface-hover)}
.btn-secondary:active{background:var(--neutral-bg)}
.btn-outline{background:transparent;color:var(--primary);border-color:var(--primary)}
.btn-outline:hover{background:var(--primary-weak)}
.btn-outline:active{background:var(--primary-weak);filter:brightness(.97)}
.btn-ghost{background:transparent;color:var(--text-2)}
.btn-ghost:hover{background:var(--surface-hover);color:var(--text)}
.btn-ghost:active{background:var(--neutral-bg)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:var(--danger-hover)}
.btn-danger:active{filter:brightness(.9)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{filter:brightness(1.05)}
.btn-success:active{filter:brightness(.94)}
.btn-link{background:transparent;color:var(--primary);height:auto;padding:0;border:0}
.btn-link:hover{text-decoration:underline}
.btn-sm{height:30px;padding:0 var(--s3);font-size:12px}
.btn-lg{height:42px;padding:0 var(--s5);font-size:14px}
.btn:disabled{opacity:.55;cursor:default;pointer-events:none}
/* estado loading — mantém largura, esconde conteúdo e mostra spinner */
.btn.is-loading{color:transparent!important;pointer-events:none}
.btn.is-loading::after{content:"";position:absolute;width:15px;height:15px;border-radius:var(--r-full);border:2px solid currentColor;border-top-color:transparent;color:inherit;animation:spin .6s linear infinite}
.btn-primary.is-loading::after,.btn-danger.is-loading::after,.btn-success.is-loading::after{border-color:#fff;border-top-color:transparent}
.icon-btn{width:32px;height:32px;border-radius:var(--r-xs);color:var(--text-2);display:inline-flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.icon-btn:hover{background:var(--surface-hover);color:var(--text)}
.icon-btn.danger:hover{background:var(--danger-bg);color:var(--danger)}
.icon-btn svg{width:15px;height:15px}

/* ============ LOGIN ============ */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:var(--s6);
  background:radial-gradient(1200px 500px at 50% -10%,rgba(79,70,229,.07),transparent)}
.login-card{width:400px;max-width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-md);padding:var(--s8)}
.brand{display:flex;align-items:center;gap:var(--s3);margin-bottom:var(--s6)}
.brand-mark{width:38px;height:38px;border-radius:var(--r-md);background:linear-gradient(135deg,#4f46e5,#7c72f4);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:var(--shadow-sm)}
.brand-mark svg{width:20px;height:20px}
.brand-mark.sm{width:32px;height:32px;border-radius:9px}
.brand-mark.sm svg{width:17px;height:17px}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-.01em}
.brand-sub{font-size:12px;color:var(--text-3)}
#login h1{font-size:19px;font-weight:600;margin:0 0 var(--s1)}
#login .lead{color:var(--text-2);font-size:13px;margin:0 0 var(--s6)}

/* ============ FIELDS ============ */
.field{margin-bottom:var(--s4)}
.field label{display:block;font-size:12.5px;font-weight:550;color:var(--text-2);margin-bottom:var(--s2)}
.field .hint{font-size:11.5px;color:var(--text-3);margin:-2px 0 var(--s2)}
.control{width:100%;height:38px;padding:0 var(--s3);border:1px solid var(--border-strong);border-radius:var(--r-sm);background:var(--surface);color:var(--text);transition:border-color .12s,box-shadow .12s;font-size:13.5px}
textarea.control{height:auto;padding:var(--s3);line-height:1.5;resize:vertical;min-height:78px}
.control::placeholder{color:var(--text-3)}
.control:focus{outline:none;border-color:var(--primary);box-shadow:var(--ring)}
select.control{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%238e8e99' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4 6l4 4 4-4'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:30px}
.form-error{color:var(--danger-ink);font-size:12.5px;margin-top:var(--s2);min-height:16px;display:flex;align-items:center;gap:6px}

/* ============ APP LAYOUT ============ */
#app{display:none;height:100vh;grid-template-columns:var(--sidebar-w) 1fr}
#app.on{display:grid}

/* SIDEBAR */
#side{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
.side-top{padding:var(--s5) var(--s5) var(--s4);display:flex;align-items:center;gap:var(--s3);border-bottom:1px solid var(--border)}
.side-top .brand-name{font-size:14px}
.side-nav{flex:1;overflow-y:auto;padding:var(--s4) var(--s3)}
.side-nav::-webkit-scrollbar{width:8px}
.side-nav::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:10px;border:2px solid var(--surface)}
.nav-group{margin-bottom:var(--s5)}
.nav-group-label{padding:0 var(--s3) var(--s2);font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3)}
.nav-item{display:flex;align-items:center;gap:var(--s3);padding:7px var(--s3);border-radius:var(--r-sm);color:var(--text-2);font-size:13.5px;font-weight:450;transition:background .12s,color .12s;position:relative;cursor:pointer;margin-bottom:1px}
.nav-item:hover{background:var(--surface-hover);color:var(--text)}
.nav-item .ic{color:var(--text-3);transition:color .12s}
.nav-item:hover .ic{color:var(--text-2)}
.nav-item.active{background:var(--primary-weak);color:var(--primary);font-weight:550}
.nav-item.active .ic{color:var(--primary)}
.nav-item .label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item .badge{font-size:11px;font-weight:550;color:var(--text-3);background:var(--neutral-bg);padding:1px 7px;border-radius:var(--r-full);min-width:20px;text-align:center}
.nav-item.active .badge{background:rgba(79,70,229,.14);color:var(--primary)}
.side-foot{border-top:1px solid var(--border);padding:var(--s3);display:flex;flex-direction:column;gap:var(--s1)}
.env-row{display:flex;align-items:center;justify-content:space-between;padding:var(--s2) var(--s3)}
.env-row .caption{font-size:11px}
.env-badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:var(--r-full);letter-spacing:.02em}
.env-prod{background:var(--success-bg);color:var(--success-ink)}
.env-homolog{background:var(--warning-bg);color:var(--warning-ink)}
.side-user{display:flex;align-items:center;gap:var(--s3);padding:var(--s2) var(--s3);border-radius:var(--r-sm)}
.side-user .who{overflow:hidden}
.side-user .who .nm{font-size:12.5px;font-weight:550;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-user .who .rl{font-size:11px;color:var(--text-3)}

/* AVATAR */
.avatar{width:30px;height:30px;border-radius:var(--r-full);background:linear-gradient(135deg,#4f46e5,#8079f5);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;flex-shrink:0;letter-spacing:.02em}
.avatar.sm{width:26px;height:26px;font-size:10.5px}

/* MAIN + HEADER */
#main{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{height:var(--header-h);flex-shrink:0;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:var(--s4);padding:0 var(--s6)}
.crumb{display:flex;align-items:center;gap:var(--s2);font-size:13px;color:var(--text-3);min-width:0}
.crumb .sep{opacity:.5}
.crumb .cur{color:var(--text);font-weight:550;white-space:nowrap}
.crumb .ic svg{width:14px;height:14px}
.header-spacer{flex:1}
.gsearch{position:relative;width:300px;max-width:34vw}
.gsearch .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none}
.gsearch .ic svg{width:15px;height:15px}
.gsearch input{width:100%;height:36px;border:1px solid var(--border);background:var(--surface-2);border-radius:var(--r-sm);padding:0 var(--s3) 0 34px;font-size:13px;transition:border-color .12s,box-shadow .12s,background .12s}
.gsearch input:focus{outline:none;border-color:var(--primary);background:var(--surface);box-shadow:var(--ring)}
.gsearch kbd{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:10.5px;color:var(--text-3);border:1px solid var(--border-strong);border-radius:5px;padding:1px 5px;font-family:var(--font)}
.header-actions{display:flex;align-items:center;gap:var(--s2)}
.hdiv{width:1px;height:26px;background:var(--border)}
.bell{position:relative}
.bell .dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:2px solid var(--surface)}
.user-chip{display:flex;align-items:center;gap:var(--s2);padding:4px 8px 4px 4px;border-radius:var(--r-full);transition:background .12s}
.user-chip:hover{background:var(--surface-hover)}
.user-chip .meta{text-align:left;line-height:1.15}
.user-chip .meta .nm{font-size:12.5px;font-weight:550}
.user-chip .meta .rl{font-size:11px;color:var(--text-3)}
.user-chip .ic svg{width:14px;height:14px;color:var(--text-3)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:var(--s6) var(--s8)}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--s4);margin-bottom:var(--s6)}
.page-head .titlewrap{display:flex;align-items:center;gap:var(--s3)}
.page-icon{width:38px;height:38px;border-radius:var(--r-md);background:var(--primary-weak);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.page-icon svg{width:19px;height:19px}
.page-actions{display:flex;align-items:center;gap:var(--s2);flex-shrink:0}

/* PANEL / CARD */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.panel-toolbar{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) var(--s4);border-bottom:1px solid var(--border)}
.tsearch{position:relative;flex:1;max-width:340px}
.tsearch .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none}
.tsearch .ic svg{width:15px;height:15px}
.tsearch input{width:100%;height:34px;border:1px solid var(--border-strong);border-radius:var(--r-sm);background:var(--surface);padding:0 var(--s3) 0 32px;font-size:13px}
.tsearch input:focus{outline:none;border-color:var(--primary);box-shadow:var(--ring)}
.toolbar-right{margin-left:auto;display:flex;align-items:center;gap:var(--s3)}
.filter-select{height:34px;border:1px solid var(--border-strong);border-radius:var(--r-sm);background:var(--surface);padding:0 30px 0 var(--s3);font-size:13px;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%238e8e99' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4 6l4 4 4-4'/></svg>");background-repeat:no-repeat;background-position:right 9px center}

/* TABLE */
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--text-3);padding:var(--s3) var(--s4);border-bottom:1px solid var(--border);background:var(--surface-2);white-space:nowrap;user-select:none}
thead th.sortable{cursor:pointer}
thead th.sortable:hover{color:var(--text-2)}
thead th .th-in{display:inline-flex;align-items:center;gap:5px}
thead th .caret{opacity:0;transition:opacity .12s}
thead th.sorted .caret{opacity:1;color:var(--primary)}
thead th .caret svg{width:13px;height:13px}
thead th.actions-col{text-align:right}
tbody td{padding:11px var(--s4);border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle;color:var(--text)}
tbody tr:last-child td{border-bottom:0}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--surface-2)}
tbody td.actions-col{text-align:right}
.rowact{display:inline-flex;gap:2px;justify-content:flex-end}
.cell-strong{font-weight:550}
.cell-mut{color:var(--text-3)}
.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px}
.codechip{background:var(--neutral-bg);color:var(--text-2);padding:2px 7px;border-radius:var(--r-xs);font-family:ui-monospace,monospace;font-size:11.5px}

/* BADGES / PILLS */
.badge-s{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:var(--r-full);font-size:11.5px;font-weight:550;line-height:1.6;white-space:nowrap}
.badge-s .dt{width:6px;height:6px;border-radius:50%;background:currentColor}
.t-neutral{background:var(--neutral-bg);color:var(--neutral-ink)}
.t-success{background:var(--success-bg);color:var(--success-ink)}
.t-warning{background:var(--warning-bg);color:var(--warning-ink)}
.t-danger{background:var(--danger-bg);color:var(--danger-ink)}
.t-info{background:var(--info-bg);color:var(--info-ink)}
.t-primary{background:var(--primary-weak);color:var(--primary)}

/* PANEL FOOT / PAGINATION */
.panel-foot{display:flex;align-items:center;justify-content:space-between;padding:var(--s3) var(--s4);border-top:1px solid var(--border)}
.result-count{font-size:12.5px;color:var(--text-3)}
.pager{display:flex;align-items:center;gap:var(--s2)}
.pager .pinfo{font-size:12.5px;color:var(--text-2);min-width:110px;text-align:center}
.pg-btn{width:32px;height:32px;border:1px solid var(--border-strong);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:background .12s}
.pg-btn:hover:not(:disabled){background:var(--surface-hover);color:var(--text)}
.pg-btn:disabled{opacity:.4;cursor:default}
.pg-btn svg{width:15px;height:15px}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:var(--s12) var(--s6)}
.empty-ill{width:56px;height:56px;border-radius:var(--r-lg);background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-3);margin-bottom:var(--s4)}
.empty-ill svg{width:24px;height:24px}
.empty-state h3{font-size:14.5px;font-weight:600;margin:0 0 var(--s2)}
.empty-state p{font-size:13px;color:var(--text-2);max-width:360px;margin:0 0 var(--s5)}

/* SKELETON */
.skel{background:linear-gradient(90deg,var(--surface-hover) 25%,var(--surface-2) 37%,var(--surface-hover) 63%);background-size:400% 100%;animation:shimmer 1.3s ease infinite;border-radius:5px;height:12px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* DASHBOARD — painéis e gráficos (donut + legenda) */
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:var(--s4) var(--s4) var(--s3)}
.panel-head .h3{font-size:13.5px}
.panel-body{padding:var(--s2) var(--s4) var(--s4)}
.donut-wrap{display:flex;align-items:center;flex-wrap:wrap;gap:var(--s5) var(--s6);padding:var(--s3) 0}
.legend{display:flex;flex-direction:column;gap:var(--s2);flex:1}
.legend-item{display:flex;align-items:center;gap:var(--s3);font-size:13px}
.legend-item .lg-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.legend-item .lg-label{color:var(--text-2);flex:1;text-transform:capitalize}
.legend-item .lg-val{font-weight:600;font-variant-numeric:tabular-nums}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(24,24,27,.4);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:80;padding:var(--s6)}
.overlay.show{display:flex;animation:fade .12s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{width:560px;max-width:100%;max-height:88vh;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-pop);animation:pop .14s ease}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:var(--s5) var(--s6) var(--s4);border-bottom:1px solid var(--border)}
.modal-head .h2{font-size:15px}
.modal-head .caption{margin-top:2px}
.modal-body{padding:var(--s5) var(--s6);overflow-y:auto}
.modal-foot{display:flex;justify-content:flex-end;gap:var(--s2);padding:var(--s4) var(--s6);border-top:1px solid var(--border);background:var(--surface-2);border-radius:0 0 var(--r-xl) var(--r-xl)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3) var(--s4)}
.form-grid .col-full{grid-column:1 / -1}

/* POPOVER (notifications + user menu + command palette) */
.popover{position:absolute;z-index:90;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-pop);display:none;overflow:hidden}
.popover.show{display:block;animation:pop .12s ease}
.pop-cmd{top:44px;left:0;right:0;width:100%}
.pop-notif{top:52px;right:120px;width:340px}
.pop-user{top:52px;right:24px;width:240px}
.pop-head{padding:var(--s3) var(--s4);border-bottom:1px solid var(--border);font-size:12.5px;font-weight:600}
.pop-list{max-height:340px;overflow-y:auto}
.notif{display:flex;gap:var(--s3);padding:var(--s3) var(--s4);border-bottom:1px solid var(--border)}
.notif:last-child{border-bottom:0}
.notif .nicon{width:30px;height:30px;border-radius:var(--r-sm);background:var(--surface-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-2)}
.notif .nicon svg{width:15px;height:15px}
.notif .nbody{min-width:0}
.notif .nt{font-size:12.5px;font-weight:500}
.notif .nm{font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notif .ntime{font-size:11px;color:var(--text-3);margin-top:2px}
.menu-item{display:flex;align-items:center;gap:var(--s3);width:100%;padding:9px var(--s4);font-size:13px;color:var(--text-2);transition:background .1s}
.menu-item:hover{background:var(--surface-hover);color:var(--text)}
.menu-item .ic svg{width:15px;height:15px}
.menu-sep{height:1px;background:var(--border);margin:var(--s1) 0}
.cmd-item{display:flex;align-items:center;gap:var(--s3);padding:9px var(--s4);cursor:pointer;font-size:13px}
.cmd-item:hover,.cmd-item.sel{background:var(--surface-hover)}
.cmd-item .ic{color:var(--text-3)}
.cmd-item .cmd-grp{margin-left:auto;font-size:11px;color:var(--text-3)}

/* TOAST */
.toast{position:fixed;bottom:var(--s6);right:var(--s6);display:none;align-items:center;gap:var(--s3);background:var(--text);color:var(--surface);padding:var(--s3) var(--s4);border-radius:var(--r-md);box-shadow:var(--shadow-pop);z-index:99;font-size:13px;font-weight:500}
.toast.show{display:flex;animation:pop .16s ease}
.toast .ic svg{width:16px;height:16px}

/* tooltip */
[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);font-size:11px;padding:3px 7px;border-radius:5px;white-space:nowrap;pointer-events:none;z-index:95}

/* ============================================================
   COMPONENTES ADICIONAIS DO DESIGN SYSTEM
   Classes reutilizáveis para padronizar controles e superfícies.
   ============================================================ */

/* spinner / loading */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:16px;height:16px;border-radius:var(--r-full);border:2px solid var(--border-strong);border-top-color:var(--primary);animation:spin .6s linear infinite}
.spinner.sm{width:13px;height:13px;border-width:2px}
.spinner.lg{width:24px;height:24px;border-width:3px}
.loading-block{display:flex;flex-direction:column;align-items:center;gap:var(--s3);color:var(--text-3);font-size:13px;padding:var(--s10) var(--s6)}

/* checkbox */
.checkbox{display:inline-flex;align-items:center;gap:var(--s2);cursor:pointer;font-size:13.5px;color:var(--text)}
.checkbox input{position:absolute;opacity:0;width:0;height:0}
.checkbox .box{width:18px;height:18px;border:1.5px solid var(--border-strong);border-radius:var(--r-xs);background:var(--surface);display:inline-flex;align-items:center;justify-content:center;color:#fff;transition:var(--t-hover)}
.checkbox .box svg{width:13px;height:13px;opacity:0;transition:opacity var(--t-fast)}
.checkbox input:checked + .box{background:var(--primary);border-color:var(--primary)}
.checkbox input:checked + .box svg{opacity:1}
.checkbox input:focus-visible + .box{box-shadow:var(--ring)}
.checkbox input:disabled + .box{opacity:.5}

/* radio */
.radio{display:inline-flex;align-items:center;gap:var(--s2);cursor:pointer;font-size:13.5px;color:var(--text)}
.radio input{position:absolute;opacity:0;width:0;height:0}
.radio .dot{width:18px;height:18px;border:1.5px solid var(--border-strong);border-radius:var(--r-full);background:var(--surface);display:inline-flex;align-items:center;justify-content:center;transition:var(--t-hover)}
.radio .dot::after{content:"";width:8px;height:8px;border-radius:var(--r-full);background:var(--primary);transform:scale(0);transition:transform var(--t-fast)}
.radio input:checked + .dot{border-color:var(--primary)}
.radio input:checked + .dot::after{transform:scale(1)}
.radio input:focus-visible + .dot{box-shadow:var(--ring)}

/* switch */
.switch{display:inline-flex;align-items:center;gap:var(--s2);cursor:pointer;font-size:13.5px;color:var(--text)}
.switch input{position:absolute;opacity:0;width:0;height:0}
.switch .track{width:36px;height:20px;border-radius:var(--r-full);background:var(--border-strong);position:relative;transition:background var(--t-fast)}
.switch .track::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:var(--r-full);background:#fff;box-shadow:var(--shadow-xs);transition:transform var(--t-fast)}
.switch input:checked + .track{background:var(--primary)}
.switch input:checked + .track::after{transform:translateX(16px)}
.switch input:focus-visible + .track{box-shadow:var(--ring)}

/* tabs */
.tabs{display:flex;align-items:center;gap:var(--s1);border-bottom:1px solid var(--border)}
.tab{padding:var(--s3) var(--s3);font-size:13px;font-weight:500;color:var(--text-2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color var(--t-fast),border-color var(--t-fast);cursor:pointer;background:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* alert (inline, contextual) */
.alert{display:flex;gap:var(--s3);padding:var(--s3) var(--s4);border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface-2);font-size:13px;color:var(--text-2);align-items:flex-start}
.alert .ic{flex-shrink:0;margin-top:1px}
.alert .ic svg{width:16px;height:16px}
.alert strong{color:var(--text);font-weight:600}
.alert-success{background:var(--success-bg);border-color:transparent;color:var(--success-ink)}
.alert-warning{background:var(--warning-bg);border-color:transparent;color:var(--warning-ink)}
.alert-danger{background:var(--danger-bg);border-color:transparent;color:var(--danger-ink)}
.alert-info{background:var(--info-bg);border-color:transparent;color:var(--info-ink)}

/* drawer (painel lateral) */
.drawer-overlay{position:fixed;inset:0;background:rgba(24,24,27,.4);backdrop-filter:blur(2px);display:none;z-index:85}
.drawer-overlay.show{display:block;animation:fade var(--t-fast)}
.drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100%;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform var(--t-drawer)}
.drawer.show{transform:none}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:var(--s5) var(--s6) var(--s4);border-bottom:1px solid var(--border)}
.drawer-body{flex:1;overflow-y:auto;padding:var(--s5) var(--s6)}
.drawer-foot{display:flex;justify-content:flex-end;gap:var(--s2);padding:var(--s4) var(--s6);border-top:1px solid var(--border);background:var(--surface-2)}

/* dialog (confirmação compacta — variante do modal) */
.modal.dialog{width:420px}
.dialog .modal-body{padding:var(--s5) var(--s6) var(--s2)}

/* section header (título de seção reutilizável) */
.section-header{display:flex;align-items:center;justify-content:space-between;gap:var(--s4);margin-bottom:var(--s4)}
.section-header .sh-titles{display:flex;flex-direction:column;gap:2px}

/* stat card genérico (o dashboard usa a variante .stat com ícone/valor/tendência) */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--s4)}

/* card form/genérico */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.card-pad{padding:var(--s5) var(--s6)}

/* ============ UTILITÁRIOS (substituem estilos inline) ============ */
.u-full{width:100%}
.u-center{justify-content:center}
.mt-sm{margin-top:var(--s2)}
.ic-success{color:var(--success)}
.ic-muted{color:var(--text-3)}
.donut-wrap svg{flex-shrink:0}
.skel-ic{width:34px;height:34px;border-radius:var(--r-sm)}
.skel-av{width:30px;height:30px;border-radius:var(--r-sm)}
.skel-h26{height:26px}
.col-span-all{grid-column:1 / -1}
.stack{display:flex;flex-direction:column}
.empty-inline{text-align:center;color:var(--text-3);padding:var(--s6) 0;font-size:13px}
.skel-w40{width:40%}.skel-w50{width:50%}.skel-w60{width:60%}.skel-w70{width:70%}
.pop-empty{padding:var(--s5);text-align:center;color:var(--text-3);font-size:13px}
.pop-empty.pad-lg{padding:var(--s5) var(--s4)}
/* user menu (popover do usuário) */
.upop-head{padding:var(--s3) var(--s4);border-bottom:1px solid var(--border);display:flex;gap:var(--s3);align-items:center}
.upop-head .who{min-width:0}
.upop-head .who .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upop-head .who .em{font-size:11.5px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upop-body{padding:var(--s2) 0}
.menu-item .spacer{margin-left:auto;color:var(--text);font-weight:600}
.menu-item.static{cursor:default}
.menu-item.is-danger{color:var(--danger)}

/* ============================================================
   DASHBOARD — Painel Operacional
   ============================================================ */
.dash-toolbar{display:flex;align-items:center;gap:var(--s2);flex-wrap:wrap;justify-content:flex-end}
.dash-updated{font-size:12px;color:var(--text-3);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.dash-updated .ic svg{width:13px;height:13px}
.dash-grid{display:grid;grid-template-columns:minmax(0,1fr) 306px;gap:var(--s4);align-items:start}
@media(max-width:1180px){.dash-grid{grid-template-columns:1fr}}
.dash-main{display:flex;flex-direction:column;gap:var(--s4);min-width:0}
.dash-offline,.dash-error{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) var(--s4);border-radius:var(--r-md);font-size:13px;margin-bottom:var(--s4)}
.dash-offline{background:var(--warning-bg);color:var(--warning-ink)}
.dash-offline .ic svg,.dash-error .ic svg{width:16px;height:16px}

/* stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:var(--s3)}
@media(max-width:1400px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:820px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.stat-grid{grid-template-columns:1fr}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--s4);display:flex;flex-direction:column;gap:var(--s3);box-shadow:var(--shadow-xs);transition:box-shadow var(--t-fast),border-color var(--t-fast)}
.stat:hover{box-shadow:var(--shadow-sm);border-color:var(--border-strong)}
.stat .stat-top{display:flex;align-items:center;justify-content:space-between}
.stat .stat-ic{width:34px;height:34px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center}
.stat .stat-ic svg{width:17px;height:17px}
.stat .stat-val{font-size:28px;font-weight:700;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
.stat .stat-label{font-size:12.5px;color:var(--text-2);margin-top:6px}
.stat .stat-sub{font-size:11.5px;color:var(--text-3);display:flex;align-items:center;gap:6px;margin-top:4px;min-height:16px}
.trend{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:1px 6px;border-radius:var(--r-full)}
.trend svg{width:11px;height:11px}
.trend.up{background:var(--success-bg);color:var(--success-ink)}
.trend.down{background:var(--danger-bg);color:var(--danger-ink)}
.trend.flat{background:var(--neutral-bg);color:var(--neutral-ink)}

/* indicator dots (discretos) */
.ind{width:8px;height:8px;border-radius:var(--r-full);display:inline-block;flex-shrink:0}
.ind-ok{background:var(--success)}.ind-warn{background:var(--warning)}.ind-crit{background:var(--danger)}
.health{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:var(--r-full);white-space:nowrap}

/* chart grid */
.chart-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--s4)}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}
.chart-grid .span2{grid-column:1 / -1}
.mini-bars{display:flex;flex-direction:column;gap:var(--s3);padding:var(--s1) 0}
.mini-bar{display:grid;grid-template-columns:104px 1fr 38px;align-items:center;gap:var(--s3);font-size:12.5px}
.mini-bar .mb-label{color:var(--text-2);text-transform:capitalize;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-bar .mb-track{height:7px;background:var(--neutral-bg);border-radius:var(--r-full);overflow:hidden}
.mini-bar .mb-fill{height:100%;border-radius:var(--r-full);background:var(--primary)}
.mini-bar .mb-val{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text-2)}
.big-metric{display:flex;flex-direction:column;gap:4px;padding:var(--s4) 0 var(--s2)}
.big-metric .bm-val{font-size:32px;font-weight:700;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
.big-metric .bm-sub{font-size:12px;color:var(--text-3)}

/* activity feed */
.feed{display:flex;flex-direction:column}
.feed-item{display:flex;gap:var(--s3);padding:var(--s3) var(--s4);border-bottom:1px solid var(--border)}
.feed-item:last-child{border-bottom:0}
.feed-ic{width:30px;height:30px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.feed-ic svg{width:15px;height:15px}
.feed-body{min-width:0;flex:1}
.feed-title{font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-title strong{font-weight:600}
.feed-meta{font-size:11px;color:var(--text-3);margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.feed-meta .dot-sep{opacity:.5}

/* side: quick status + alerts */
.side-block{padding:var(--s3) var(--s4)}
.side-block+.side-block{border-top:1px solid var(--border)}
.qs-row{display:flex;align-items:center;gap:var(--s2);padding:6px 0;font-size:12.5px}
.qs-row .qs-label{flex:1;color:var(--text-2)}
.qs-row .qs-count{font-weight:700;font-variant-numeric:tabular-nums;color:var(--text)}
.alerts{display:flex;flex-direction:column;gap:var(--s2)}
.alert-row{display:flex;gap:var(--s3);align-items:center;padding:var(--s3);border-radius:var(--r-md);background:var(--surface-2);border:1px solid var(--border)}
.alert-row .ar-ic{width:30px;height:30px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alert-row .ar-ic svg{width:15px;height:15px}
.alert-row .ar-body{min-width:0;flex:1}
.alert-row .ar-title{font-size:12.5px;font-weight:600;color:var(--text)}
.alert-row .ar-desc{font-size:11.5px;color:var(--text-2);margin-top:1px}
.alert-row .ar-count{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text)}
.empty-state.sm{padding:var(--s8) var(--s5)}
.empty-ill.ok{color:var(--success-ink);background:var(--success-bg);border-color:transparent}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <div class="brand-mark"><i data-lucide="audio-lines"></i></div>
      <div><div class="brand-name">Porter Music</div><div class="brand-sub">Console Corporativo</div></div>
    </div>
    <h1>Acesso administrativo</h1>
    <p class="lead">Entre com sua conta corporativa para gerenciar a operação.</p>
    <div class="field"><label>Email corporativo</label><input id="email" class="control" type="email" autocomplete="username" value="ascendfittt@gmail.com" /></div>
    <div class="field"><label>Senha</label><input id="password" class="control" type="password" autocomplete="current-password" placeholder="••••••••••" /></div>
    <button class="btn btn-primary btn-lg u-full" id="loginBtn">Entrar</button>
    <div class="form-error" id="loginErr"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <!-- SIDEBAR -->
  <aside id="side">
    <div class="side-top">
      <div class="brand-mark sm"><i data-lucide="audio-lines"></i></div>
      <div><div class="brand-name">Porter Music</div><div class="brand-sub">Console</div></div>
    </div>
    <nav class="side-nav" id="nav"></nav>
    <div class="side-foot">
      <div class="env-row">
        <span class="caption" id="versionLabel">v1.0.0</span>
        <span class="env-badge" id="envBadge">—</span>
      </div>
      <div class="side-user" id="sideUser"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div id="main">
    <header class="header">
      <div class="crumb" id="crumb"></div>
      <div class="header-spacer"></div>
      <div class="gsearch">
        <span class="ic"><i data-lucide="search"></i></span>

function toast(m,ico='check-circle-2'){const t=$('toast');t.innerHTML=`<span class="ic"><i data-lucide="${ico}"></i></span>${esc(m)}`;t.classList.add('show');icons();clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
function fmtDate(v){if(!v)return '—';const d=new Date(v);const now=new Date();const diff=(now-d)/1000;
  if(diff>=0&&diff<60)return 'agora há pouco';
  if(diff>=0&&diff<3600)return Math.floor(diff/60)+' min atrás';
  if(diff>=0&&diff<86400)return Math.floor(diff/3600)+' h atrás';
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'2-digit'})+' · '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function fmtDur(ms){if(!ms)return '—';const s=Math.round(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function initials(n){return (n||'?').trim().split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase();}

    if(error){$('loginErr').innerHTML=`<span class="ic"><i data-lucide="alert-circle"></i></span>Falha no login: ${esc(error.message||error.name||'erro')}${error.status?(' ('+error.status+')'):''}`;icons();return;}

};

/* ===== SIDEBAR ===== */
function buildNav(){
  const w=$('nav');w.innerHTML='';
  NAV.forEach(([sec,keys])=>{
    const g=document.createElement('div');g.className='nav-group';
    g.innerHTML=`<div class="nav-group-label">${sec}</div>`;
    keys.forEach(k=>{

      it.innerHTML=`<span class="ic"><i data-lucide="${META[k].icon}"></i></span><span class="label">${META[k].title}</span><span class="badge" id="cnt-${k}"></span>`;

  });

async function updateCounts(){
  for(const [,keys] of NAV)for(const k of keys){

    const e=$('cnt-'+k);if(e)e.textContent=count??'';
  }
}

/* ===== NAV / ROUTER ===== */
function go(k){

/* ===== DASHBOARD — Painel Operacional ===== */
const DASH_TTL=30000; // cache de dados por 30s (evita consultas repetidas)
let dashCache=null;                 // {ts, data}
let dashFilter={unit:'',shift:''};  // filtros de unidade/turno (client-side)
const STATE_COLORS={active:'var(--success)',idle:'var(--warning)',in_call:'var(--info)',blocked:'var(--danger)',offline:'var(--text-3)',outside_shift:'var(--violet)'};
const PRESENT=new Set(['active','idle','in_call','outside_shift']);

async function renderDashboard(force){
  const c=$('content');
  c.innerHTML=dashShell();
  wireDashHeader();icons();updateCounts();
  if(!navigator.onLine){renderDashOffline();return;}
  try{
    if(force||!dashCache||(Date.now()-dashCache.ts>DASH_TTL)){
      dashCache={ts:Date.now(),data:await fetchDashData()};
    }
    renderDashData(dashCache.data);
  }catch(e){
    if(!navigator.onLine||/network|fetch|failed/i.test(e.message||''))renderDashOffline();
    else renderDashError(e);
  }
}

function wireDashHeader(){
  const u=$('dshUnit'),s=$('dshShift'),r=$('dshRefresh');
  if(u)u.onchange=()=>{dashFilter.unit=u.value;if(dashCache)renderDashData(dashCache.data);};
  if(s)s.onchange=()=>{dashFilter.shift=s.value;if(dashCache)renderDashData(dashCache.data);};
  if(r)r.onclick=async()=>{r.classList.add('is-loading');r.disabled=true;await renderDashboard(true);};

/* ---- busca de dados (somente leitura, em paralelo, com cache) ---- */
async function fetchDashData(){
  const R=await Promise.all([
    sb.from('operators').select('id,display_name,unit_id,default_shift_id,active').limit(2000),
    sb.from('operator_states').select('operator_id,status,activity,updated_at').order('updated_at',{ascending:false}).limit(1000),
    sb.from('operator_sessions').select('operator_id,status,app_version,started_at,last_heartbeat_at').order('started_at',{ascending:false}).limit(1000),
    sb.from('devices').select('id,label,unit_id,status,last_seen_at').limit(1000),
    sb.from('operator_blocks').select('operator_id,reason_code,status,started_at,blocked_until').order('started_at',{ascending:false}).limit(500),
    sb.from('challenge_logs').select('operator_id,status,answer_result,created_at,expires_at').order('created_at',{ascending:false}).limit(500),
    sb.from('call_sessions').select('operator_id,status,started_at,finished_at').order('started_at',{ascending:false}).limit(1000),
    sb.from('app_versions').select('version,platform,channel,status').order('version',{ascending:false}).limit(50),
    sb.from('operational_events').select('received_at,event_type,operator_id').order('received_at',{ascending:false}).limit(200),
    sb.from('admin_audit_logs').select('action,entity_type,reason,occurred_at,admin_user_id').order('occurred_at',{ascending:false}).limit(30),
    sb.from('app_release_rules').select('update_policy,active,minimum_version,latest_version,scope_type').limit(200),
    sb.from('admin_users').select('id,display_name').limit(500),
  ]);
  const bad=R.find(x=>x.error);if(bad&&bad.error)throw bad.error;
  const [operators,states,sessions,devices,blocks,clogs,calls,versions,events,audits,rules,admins]=R.map(x=>x.data||[]);
  return {operators,states,sessions,devices,blocks,clogs,calls,versions,events,audits,rules,
    adminMap:Object.fromEntries(admins.map(a=>[a.id,a.display_name]))};
}
